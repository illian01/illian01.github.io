<!-- Target for toggling the sidebar `.sidebar-checkbox` is for regular
     styles, `#sidebar-checkbox` for behavior. -->
<input type="checkbox" class="sidebar-checkbox" id="sidebar-checkbox">

<!-- Toggleable sidebar -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-item">
    <p style='font-size:14px; font-weight:bold'>Junho Shin</p>
    <p>Computer Vision, Image Processing, Machine Learning</p>
  </div>

  <nav class="sidebar-nav">

    {% assign pages_list = site.pages | sort:"url" %}
    {% for node in pages_list %}
      {% if node.title != null %}
        {% if node.layout == "page" %}

          <a class="sidebar-nav-item{% if page.url == node.url %} active{% endif %}" href="{{ node.url | absolute_url }}">{{ node.title }}</a>

        {% endif %}
      {% endif %}
    {% endfor %}

  </nav>

  <div class="sidebar-item">
    Theme : <a href="http://lanyon.getpoole.com">Lanyon</a>, <a href="https://github.com/poole">GitHub</a>
  </div>
</div>
